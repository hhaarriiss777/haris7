<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haris Hussain — Counties Visited</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #111;
    }

    header {
      padding: 20px;
      background: white;
      border-bottom: 1px solid #ddd;
    }

    header h1 {
      margin: 0 0 8px;
    }

    header p {
      margin: 0;
      color: #555;
    }

    #topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 14px;
    }

    button {
      border: 1px solid #ccc;
      background: white;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #f1f1f1;
    }

    .pill {
      background: #eef4ff;
      border: 1px solid #cfe0ff;
      color: #24457a;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 14px;
    }

    #layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      height: calc(100vh - 145px);
    }

    #map {
      height: 100%;
      width: 100%;
      min-height: 500px;
    }

    #sidebar {
      background: white;
      border-left: 1px solid #ddd;
      padding: 18px;
      overflow-y: auto;
    }

    .county-title {
      margin-top: 0;
    }

    .meta {
      color: #666;
      font-size: 14px;
      margin-bottom: 14px;
    }

    .gallery {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .gallery img {
      width: 100%;
      border-radius: 12px;
      display: block;
    }

    .caption {
      font-size: 14px;
      color: #444;
      margin-top: 6px;
    }

    .empty {
      color: #666;
      line-height: 1.5;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px;
      font-family: monospace;
      font-size: 12px;
      resize: vertical;
      margin-top: 12px;
    }

    @media (max-width: 900px) {
      #layout {
        grid-template-columns: 1fr;
        grid-template-rows: 55vh auto;
        height: auto;
      }

      #sidebar {
        border-left: none;
        border-top: 1px solid #ddd;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Counties I’ve Visited</h1>
    <p>Click a county to see photos and notes. Turn on selection mode to mark counties you’ve been to.</p>

    <div id="topbar">
      <button id="toggleSelectionBtn">Enable selection mode</button>
      <button id="exportBtn">Export visited counties</button>
      <button id="copyBtn">Copy export</button>
      <button id="clearBtn">Clear all selected</button>
      <div class="pill" id="countPill">Visited counties: 2</div>
    </div>
  </header>

  <div id="layout">
    <div id="map"></div>

    <aside id="sidebar">
      <h2 class="county-title">Welcome</h2>
      <p class="empty">
        Normal mode: click a green county to see photos and notes.<br/><br/>
        Selection mode: click counties to turn them visited or unvisited.
      </p>
      <textarea id="exportBox" placeholder="Your exported visited counties JSON will appear here."></textarea>
    </aside>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const visitedCountyData = {};

    const initialVisitedCountyIds = [
      "04005", "04013", "04015", "04021", "04025", "06003", "06005", "06009", "06017", "06027",
      "06043", "06051", "06057", "06061", "06067", "06071", "06073", "06077", "06099", "06109",
      "08001", "08003", "08005", "08007", "08013", "08019", "08023", "08031", "08035", "08037",

      "08091", "08101", "08105", "08111", "08117", "09003", "11001", "12001", "12023", "12047",
      "12057", "12069", "12081", "12083", "12095", "12103", "12105", "12119", "13015", "13021",
      "13035", "13047", "13063", "13067", "13075", "13081", "13089", "13093", "13121", "13129",
      "13151", "13153", "13171", "13185", "13207", "13225", "13277", "13287", "13313", "15009",
      "17007", "17019", "17029", "17031", "17035", "17037", "17041", "17043", "17049", "17051",
      "17053", "17055", "17063", "17075", "17077", "17081", "17089", "17091", "17093", "17097",

      "18089", "18091", "18097", "18105", "18109", "18127", "18141", "18143", "18151", "18157",
      "18181", "21009", "21029", "21067", "21073", "21093", "21099", "21111", "21125", "21151",
      "21203", "21209", "21211", "21213", "21227", "21235", "21239", "24001", "24003", "24033",

      "26089", "26107", "26109", "26117", "26121", "26133", "26139", "26149", "26159", "26161",

      "40097", "40099", "40109", "40115", "40131", "40143", "42003", "42019", "42039", "42049",

      "47141", "47145", "47147", "47149", "47155", "47159", "47189", "48027", "48029", "48039",
      "48085", "48091", "48097", "48113", "48121", "48139", "48157", "48201", "48209", "48217",
      "48309", "48397", "48439", "48453", "48491", "49011", "49017", "49021", "49029", "49035",
      "49043", "49053", "51013", "51015", "51043", "51059", "51061", "51069", "51079", "51107",
      "51113", "51139", "51153", "51157", "51165", "51187", "51820", "54003", "54065", "55001",
      "55009", "55015", "55021", "55025", "55027", "55029", "55033", "55035", "55039", "55053",
      "55055", "55057", "55059", "55061", "55071", "55075", "55079", "55081", "55083", "55087",
      "55089", "55101", "55105", "55109", "55111", "55117", "55127", "55131", "55133", "55139"
    ];

    const map = L.map("map").setView([39.5, -98.35], 4);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 18,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    let selectionMode = false;
    const selectedCountyIds = new Set(initialVisitedCountyIds);
    const exportBox = document.getElementById("exportBox");
    const countPill = document.getElementById("countPill");
    const toggleSelectionBtn = document.getElementById("toggleSelectionBtn");

    function updateCount() {
      countPill.textContent = `Visited counties: ${selectedCountyIds.size}`;
    }

    function renderSidebar(data) {
      const sidebar = document.getElementById("sidebar");

      const photosHtml = (data.photos || []).map(photo => `
        <div>
          <img src="${photo.src}" alt="${photo.caption || data.name}" />
          ${photo.caption ? `<div class="caption">${photo.caption}</div>` : ""}
        </div>
      `).join("");

      sidebar.innerHTML = `
        <h2 class="county-title">${data.name}</h2>
        <div class="meta">${data.date || ""}</div>
        <p>${data.notes || ""}</p>
        <div class="gallery">
          ${photosHtml || '<p class="empty">No photos yet.</p>'}
        </div>
        <textarea id="exportBox" placeholder="Your exported visited counties JSON will appear here.">${exportBox.value || ""}</textarea>
      `;
    }

    function getCountyId(feature) {
      return (
        feature.properties?.GEOID ||
        feature.properties?.GEOID10 ||
        feature.properties?.FIPS ||
        feature.properties?.id ||
        feature.id
      );
    }

    function getCountyName(feature) {
      const county = feature.properties?.NAME || "County";
      const state =
        feature.properties?.STATE_NAME ||
        feature.properties?.STATE ||
        "";
      return state ? `${county}, ${state}` : county;
    }

    function styleFeature(feature) {
      const countyId = getCountyId(feature);
      const visited = selectedCountyIds.has(String(countyId));

      return {
        color: "#555",
        weight: 1,
        fillColor: visited ? "#2e7d32" : "#d9d9d9",
        fillOpacity: visited ? 0.75 : 0.45
      };
    }

    function exportVisitedCounties() {
      const sortedIds = Array.from(selectedCountyIds).sort();
      const exportData = {
        visitedCountyIds: sortedIds
      };
      const box = document.getElementById("exportBox");
      box.value = JSON.stringify(exportData, null, 2);
    }

    let geojsonLayer;

    function onEachFeature(feature, layer) {
      const countyId = String(getCountyId(feature));
      const info = visitedCountyData[countyId];
      const countyLabel = getCountyName(feature);

      layer.bindTooltip(countyLabel);

      layer.on({
        click: () => {
          if (selectionMode) {
            if (selectedCountyIds.has(countyId)) {
              selectedCountyIds.delete(countyId);
            } else {
              selectedCountyIds.add(countyId);
            }
            geojsonLayer.resetStyle();
            updateCount();
            exportVisitedCounties();
            document.getElementById("sidebar").innerHTML = `
              <h2 class="county-title">${countyLabel}</h2>
              <p class="empty">${selectedCountyIds.has(countyId) ? "Marked visited." : "Marked unvisited."}</p>
              <textarea id="exportBox" placeholder="Your exported visited counties JSON will appear here.">${JSON.stringify({ visitedCountyIds: Array.from(selectedCountyIds).sort() }, null, 2)}</textarea>
            `;
            return;
          }

          if (info) {
            renderSidebar(info);
          } else {
            document.getElementById("sidebar").innerHTML = `
              <h2 class="county-title">${countyLabel}</h2>
              <p class="empty">You have not added photo data for this county yet.</p>
              <textarea id="exportBox" placeholder="Your exported visited counties JSON will appear here.">${JSON.stringify({ visitedCountyIds: Array.from(selectedCountyIds).sort() }, null, 2)}</textarea>
            `;
          }
        },
        mouseover: (e) => {
          e.target.setStyle({ weight: 2 });
        },
        mouseout: (e) => {
          geojsonLayer.resetStyle(e.target);
        }
      });
    }

    toggleSelectionBtn.addEventListener("click", () => {
      selectionMode = !selectionMode;
      toggleSelectionBtn.textContent = selectionMode ? "Disable selection mode" : "Enable selection mode";
    });

    document.getElementById("exportBtn").addEventListener("click", () => {
      exportVisitedCounties();
    });

    document.getElementById("copyBtn").addEventListener("click", async () => {
      exportVisitedCounties();
      const text = document.getElementById("exportBox").value;
      try {
        await navigator.clipboard.writeText(text);
        alert("Copied visited counties JSON.");
      } catch (err) {
        alert("Copy failed. You can still select and copy from the text box manually.");
      }
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      if (!confirm("Clear all selected counties?")) return;
      selectedCountyIds.clear();
      geojsonLayer.resetStyle();
      updateCount();
      exportVisitedCounties();
      document.getElementById("sidebar").innerHTML = `
        <h2 class="county-title">Selection cleared</h2>
        <p class="empty">All counties are now unvisited.</p>
        <textarea id="exportBox" placeholder="Your exported visited counties JSON will appear here.">${JSON.stringify({ visitedCountyIds: [] }, null, 2)}</textarea>
      `;
    });

    fetch("./counties.geojson")
      .then(response => {
        if (!response.ok) {
          throw new Error("Could not load counties.geojson");
        }
        return response.json();
      })
      .then(counties => {
        geojsonLayer = L.geoJSON(counties, {
          style: styleFeature,
          onEachFeature: onEachFeature
        }).addTo(map);

        map.fitBounds(geojsonLayer.getBounds());
        updateCount();
        exportVisitedCounties();
      })
      .catch(error => {
        console.error(error);
        document.getElementById("sidebar").innerHTML = `
          <h2 class="county-title">Map could not load</h2>
          <p class="empty">
            The page loaded, but counties.geojson could not be drawn.
            Check that the GeoJSON file is valid and in the same folder as index.html.
          </p>
          <textarea id="exportBox" placeholder="Your exported visited counties JSON will appear here."></textarea>
        `;
      });
  </script>
</body>
</html>
